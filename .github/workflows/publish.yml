name: Publish npm package

on:
  push:
    branches:
      - master

jobs:
  publish:
    if: github.repository_owner == 'koralabs'
    name: Build & Publish
    environment: mainnet
    permissions:
      contents: read
      id-token: write
      packages: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14"
          check-latest: true
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm CLI
        # Node 22.14 ships with npm 10.9.2, but npm's OIDC trusted-publisher
        # flow requires npm >= 11.5.1. Install the latest npm over the top.
        run: npm install -g npm@latest

      - name: Diagnose publish environment
        run: |
          echo "node version:   $(node -v)"
          echo "npm version:    $(npm -v)"
          echo "which npm:      $(which npm)"
          echo "PATH:           ${PATH}"
          echo "--- OIDC env vars ---"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL set: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN set: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+yes}"
          echo "--- .npmrc locations ---"
          for f in "$HOME/.npmrc" "$NPM_CONFIG_USERCONFIG" "./.npmrc"; do
            if [[ -f "$f" ]]; then
              echo ">>> $f"
              # mask tokens in log output
              sed 's/_authToken=.*/_authToken=***/' "$f"
            fi
          done
          echo "--- npm config resolved ---"
          npm config ls -l 2>&1 | head -40 || true

      - name: Install Libssl
        run: |
          wget -q https://nz2.archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2.24_amd64.deb
          sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2.24_amd64.deb

      - name: Install Aiken
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://install.aiken-lang.org | sh
          ~/.aiken/bin/aikup install v1.0.29-alpha
          sudo ln -s ~/.aiken/bin/aiken /usr/local/bin/aiken

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run Aiken tests
        run: npm run test:aiken

      - name: Run Node tests
        run: npm run test

      - name: Build
        run: npm run build && cp package.json ./lib/package.json

      - name: Publish to GitHub Packages
        env:
          DEPLOYMENT_ACCESS_TOKEN: ${{ secrets.DEPLOYMENT_ACCESS_TOKEN }}
        run: |
          set -eu
          npm config set //npm.pkg.github.com/:_authToken ${DEPLOYMENT_ACCESS_TOKEN}
          set +e
          publish_log=$(mktemp)
          (cd ./lib && npm publish --@koralabs:registry='https://npm.pkg.github.com') >"${publish_log}" 2>&1
          status=$?
          set -e
          cat "${publish_log}"
          if [[ ${status} -ne 0 ]]; then
            # npm's wording for "already published" differs across versions:
            # npm 10 used "Cannot publish over existing version";
            # npm 11 uses "cannot publish over the previously published
            # versions" — match the common tail.
            if grep -qiE "publish over (the previously )?(existing|published) version" "${publish_log}"; then
              echo "GitHub package version already exists, continuing to public publish"
            else
              rm -f "${publish_log}"
              exit ${status}
            fi
          fi
          rm -f "${publish_log}"

      - name: Publish to public npm
        # OIDC trusted-publisher flow — no NPM_TOKEN. npm CLI >= 11.5.1
        # automatically exchanges the GitHub Actions OIDC token (via the
        # `id-token: write` permission set at the job level) for a short-
        # lived npm publish credential, and emits the provenance
        # attestation automatically.
        run: |
          set -eu
          (cd ./lib && npm publish --access public --ignore-scripts --provenance)
