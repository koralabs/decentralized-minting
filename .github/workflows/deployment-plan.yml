name: Deployment Plan

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      desired_path:
        description: Desired deployment YAML path
        required: false
        default: deploy/preview/decentralized-minting.yaml

jobs:
  deployment-plan:
    if: github.repository_owner == 'koralabs'
    environment: mainnet
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      KORA_USER_AGENT: ${{ vars.KORA_USER_AGENT }}
      DESIRED_PATH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.desired_path || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13"
          check-latest: true

      - name: Install Libssl and Aiken
        run: |
          wget -q https://nz2.archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2.24_amd64.deb
          sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2.24_amd64.deb
          curl --proto '=https' --tlsv1.2 -LsSf https://install.aiken-lang.org | sh
          ~/.aiken/bin/aikup install v1.0.29-alpha
          sudo ln -s ~/.aiken/bin/aiken /usr/local/bin/aiken

      - name: Install dependencies
        run: npm ci

      - name: Generate deployment artifacts
        env:
          PREVIEW_BLOCKFROST_API_KEY: ${{ secrets.PREVIEW_BLOCKFROST_API_KEY }}
          PREPROD_BLOCKFROST_API_KEY: ${{ secrets.PREPROD_BLOCKFROST_API_KEY }}
          MAINNET_BLOCKFROST_API_KEY: ${{ secrets.MAINNET_BLOCKFROST_API_KEY }}
        shell: bash
        run: |
          set -eu
          mkdir -p artifacts
          if [ -n "$DESIRED_PATH" ]; then
            desired_paths=("$DESIRED_PATH")
          else
            mapfile -t desired_paths < <(find deploy -mindepth 2 -maxdepth 2 -name '*.yaml' | sort)
          fi

          for desired_path in "${desired_paths[@]}"; do
            network="$(basename "$(dirname "$desired_path")")"
            network_upper="$(echo "$network" | tr '[:lower:]' '[:upper:]')"
            blockfrost_key_var="${network_upper}_BLOCKFROST_API_KEY"
            export BLOCKFROST_API_KEY="${!blockfrost_key_var:-}"
            npx tsx scripts/generateDeploymentPlan.ts --desired "$desired_path" --artifacts-dir "artifacts/$network"
          done

      - name: Checkout minting engine
        if: always()
        uses: actions/checkout@v4
        with:
          repository: koralabs/minting.handle.me
          token: ${{ secrets.DEPLOYMENT_ACCESS_TOKEN }}
          path: minting.handle.me

      - name: Install minting engine dependencies
        if: always()
        run: npm ci
        working-directory: minting.handle.me

      - name: Fetch handlecontract session script
        if: always()
        env:
          DEPLOYMENT_ACCESS_TOKEN: ${{ secrets.DEPLOYMENT_ACCESS_TOKEN }}
        run: |
          curl -fsSL -H "Authorization: Bearer ${DEPLOYMENT_ACCESS_TOKEN}" \
            https://raw.githubusercontent.com/koralabs/adahandle-deployments/master/common/ensure_handlecontract_sessions.py \
            -o ensure_handlecontract_sessions.py

      - name: Ensure handlecontract sessions
        if: always()
        env:
          POLICY_KEY: ${{ secrets.POLICY_KEY }}
          PREVIEW_POLICY_ID: ${{ secrets.PREVIEW_POLICY_ID }}
          PREPROD_POLICY_ID: ${{ secrets.PREPROD_POLICY_ID }}
          MAINNET_POLICY_ID: ${{ secrets.MAINNET_POLICY_ID }}
          PREVIEW_BLOCKFROST_API_KEY: ${{ secrets.PREVIEW_BLOCKFROST_API_KEY }}
          PREPROD_BLOCKFROST_API_KEY: ${{ secrets.PREPROD_BLOCKFROST_API_KEY }}
          MAINNET_BLOCKFROST_API_KEY: ${{ secrets.MAINNET_BLOCKFROST_API_KEY }}
        run: python3 ensure_handlecontract_sessions.py --artifacts-dir artifacts --minting-repo minting.handle.me
        continue-on-error: true

      - name: Upload deployment plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-plan-${{ github.run_id }}
          path: artifacts
          if-no-files-found: error
          retention-days: 7
