name: Deployment Plan

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      desired_path:
        description: Desired deployment YAML path (leave empty for all networks)
        required: false

jobs:
  plan:
    if: github.repository_owner == 'koralabs'
    strategy:
      fail-fast: false
      matrix:
        include:
          - network: preview
            desired_path: deploy/preview/decentralized-minting.yaml
          - network: preprod
            desired_path: deploy/preprod/decentralized-minting.yaml
          - network: mainnet
            desired_path: deploy/mainnet/decentralized-minting.yaml
    name: ${{ matrix.network }}
    environment: ${{ matrix.network }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      KORA_USER_AGENT: ${{ vars.KORA_USER_AGENT }}
      AWS_ACCESS_KEY_ID: ${{ secrets.DEPLOYMENT_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.DEPLOYMENT_AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13"
          check-latest: true

      - name: Install Libssl and Aiken
        run: |
          wget -q https://nz2.archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2.24_amd64.deb
          sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2.24_amd64.deb
          curl --proto '=https' --tlsv1.2 -LsSf https://install.aiken-lang.org | sh
          ~/.aiken/bin/aikup install v1.0.29-alpha
          sudo ln -s ~/.aiken/bin/aiken /usr/local/bin/aiken

      - name: Install dependencies
        run: npm ci

      - name: Decrypt KMS environment bundle
        env:
          KMS_ENV_BUNDLE_ENC: ${{ secrets.KMS_ENV_BUNDLE_ENC }}
        run: |
          if [ -z "$KMS_ENV_BUNDLE_ENC" ]; then
            echo "No KMS_ENV_BUNDLE_ENC available, skipping decryption"
            exit 0
          fi
          plaintext=$(echo "$KMS_ENV_BUNDLE_ENC" | base64 -d | aws kms decrypt --ciphertext-blob fileb:///dev/stdin --output text --query Plaintext | base64 -d)
          for key in $(echo "$plaintext" | python3 -c "import sys,json; [print(k) for k in json.load(sys.stdin).keys()]"); do
            value=$(echo "$plaintext" | python3 -c "import sys,json; print(json.load(sys.stdin).get('$key',''))")
            echo "::add-mask::$value"
            echo "$key=$value" >> "$GITHUB_ENV"
          done
          # Map generic keys to network-prefixed keys for ensure_handlecontract_sessions
          NETWORK_UPPER="$(echo '${{ matrix.network }}' | tr '[:lower:]' '[:upper:]')"
          bf_key=$(echo "$plaintext" | python3 -c "import sys,json; print(json.load(sys.stdin).get('BLOCKFROST_API_KEY',''))")
          policy_id=$(echo "$plaintext" | python3 -c "import sys,json; print(json.load(sys.stdin).get('POLICY_ID',''))")
          echo "${NETWORK_UPPER}_BLOCKFROST_API_KEY=$bf_key" >> "$GITHUB_ENV"
          echo "${NETWORK_UPPER}_POLICY_ID=$policy_id" >> "$GITHUB_ENV"
          echo "Decrypted KMS bundle keys: $(echo "$plaintext" | python3 -c "import sys,json; print(' '.join(sorted(json.load(sys.stdin).keys())))")"

      - name: Generate deployment plan (initial)
        run: |
          set -eu
          mkdir -p artifacts/${{ matrix.network }}
          npx tsx scripts/generateDeploymentPlan.ts \
            --desired ${{ matrix.desired_path }} \
            --artifacts-dir artifacts/${{ matrix.network }}

      - name: Checkout minting engine
        uses: actions/checkout@v4
        with:
          repository: koralabs/minting.handle.me
          token: ${{ secrets.DEPLOYMENT_ACCESS_TOKEN }}
          path: minting.handle.me

      - name: Install minting engine dependencies
        run: npm ci
        working-directory: minting.handle.me

      - name: Fetch handlecontract session script
        run: |
          curl -fsSL -H "Authorization: Bearer ${{ secrets.DEPLOYMENT_ACCESS_TOKEN }}" \
            https://raw.githubusercontent.com/koralabs/adahandle-deployments/master/common/ensure_handlecontract_sessions.py \
            -o ensure_handlecontract_sessions.py

      - name: Ensure handlecontract sessions
        env:
          NETWORK: ${{ matrix.network }}
        run: python3 ensure_handlecontract_sessions.py --artifacts-dir artifacts --minting-repo minting.handle.me
        continue-on-error: true

      - name: Re-generate deployment plan (with subhandles)
        run: |
          set -eu
          npx tsx scripts/generateDeploymentPlan.ts \
            --desired ${{ matrix.desired_path }} \
            --artifacts-dir artifacts/${{ matrix.network }}

      - name: Upload deployment plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-plan-${{ matrix.network }}-${{ github.run_id }}
          path: artifacts/${{ matrix.network }}
          if-no-files-found: error
          retention-days: 7
